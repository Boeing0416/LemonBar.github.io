            <h2>店內規範</h2>
            <p>為了確保所有客人享有愉快的用餐體驗，請遵守以下規範：</p>
            <ul>
                <li>請勿在店內吸煙。</li>
                <li>請保持安靜，避免大聲喧嘩。</li>
                <li>用餐時間請勿佔用座位過久。</li>
                <li>請尊重其他客人及服務人員。</li>
                <li>未滿18歲者請勿飲酒。</li>
                <li>請妥善保管個人物品。</li>
            </ul>
